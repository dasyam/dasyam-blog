     work" and point to WhatsApp as the next place to look. Full entitlement
     detail already lives on the paywall screen (just seen) and WA Template 1
     (about to arrive), so this doesn't repeat either. -->
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>You're in</title>
<meta name="description" content="You're in. Check WhatsApp to set up your onboarding call.">
<meta name="theme-color" content="#db8b57">
<meta name="color-scheme" content="light">

<!-- Preconnects for analytics (still lazy-loaded below) -->
<link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
<link rel="dns-prefetch" href="https://www.googletagmanager.com">
<link rel="preconnect" href="https://www.clarity.ms" crossorigin>
<link rel="dns-prefetch" href="https://www.clarity.ms">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          accent: {
            50:'#fdf3ea', 100:'#fbeadd', 200:'#f3d3b3', 300:'#e8b587',
            500:'#db8b57', 600:'#db8b57', 700:'#93521f'
          }
        }
      }
    }
  }
</script>
<!-- === Analytics: GA4 + Clarity (queued, then lazy-loaded) ===
     dataLayer/gtag and the Clarity queue stub are defined synchronously
     here (cheap — no network call), so any gtag()/clarity() call made
     anywhere on the page — even before the scripts below finish loading —
     gets queued and processed once they do, instead of silently dropping.
     Only the actual network fetch of gtag.js / the Clarity tag is deferred
     until first interaction (or idle), so initial paint stays unblocked.
     Same lazy-load pattern used on pcosclarity.com. IDs are Rhythm-specific
     (GA4 property + Clarity project created 2026-07-16) — do not reuse
     pcosclarity's IDs here. -->
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){ dataLayer.push(arguments); }
window.gtag = gtag;
gtag('js', new Date());
gtag('config', 'G-SXWZ5613QV');

(function(c,l,a,r,i){
  c[a] = c[a] || function(){ (c[a].q = c[a].q || []).push(arguments); };
})(window, document, "clarity", "script", "xnay3et4bz");

(function lazyAnalytics(){
  let loaded = false;
  function loadAnalytics() {
    if (loaded) return;
    loaded = true;

    const ga = document.createElement('script');
    ga.async = true;
    ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-SXWZ5613QV';
    document.head.appendChild(ga);

    const cl = document.createElement('script');
    cl.async = true;
    cl.src = 'https://www.clarity.ms/tag/xnay3et4bz';
    document.head.appendChild(cl);
  }
  const start = () => { loadAnalytics(); remove(); };
  function remove(){
    ['scroll','mousedown','touchstart','keydown'].forEach(ev => window.removeEventListener(ev, start, { passive: true }));
  }
  ['scroll','mousedown','touchstart','keydown'].forEach(ev => window.addEventListener(ev, start, { passive: true }));
  (window.requestIdleCallback || function(f){ setTimeout(f,1500); })(loadAnalytics);
})();
</script>
</head>
<body class="bg-white text-slate-800 antialiased">

<div class="mx-auto flex min-h-screen max-w-[540px] flex-col justify-center px-6">

  <section class="py-14 text-center">
    <div class="mb-6 inline-flex h-16 w-16 items-center justify-center rounded-full bg-accent-50 text-3xl">
      🎉
    </div>
    <h1 id="heading" class="mb-3 text-3xl font-extrabold leading-tight tracking-tight text-slate-900 sm:text-4xl">
      You're in
    </h1>
    <p class="mb-2 text-lg text-slate-700">
      We'll message you on WhatsApp to set up your onboarding call.
    </p>
    <p class="text-slate-500">Nothing else to do right now.</p>
  </section>

</div>

<script>
  const name = sessionStorage.getItem('lead_name');
  if (name) {
    document.getElementById('heading').textContent = `You're in, ${name}`;
    // Only counted as a real completion if this page was reached through
    // the actual flow (lead_name set by index.html/pay.html) — guards
    // against a stray direct visit to this URL inflating the count.
    gtag('event', 'signup_complete');
  }
</script>

</body>
</html>
