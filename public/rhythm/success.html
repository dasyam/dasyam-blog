<!-- === Lazy-load Analytics: GA4 + Clarity ===
     Deferred until first user interaction (or idle, whichever comes first)
     so it never competes with the initial paint. Same pattern used on
     pcosclarity.com. IDs are Rhythm-specific (GA4 property + Clarity
     project created 2026-07-16) — do not reuse pcosclarity's IDs here. -->
<script>
(function lazyAnalytics(){
  let loaded = false;
  function loadAnalytics() {
    if (loaded) return;
    loaded = true;

    const ga = document.createElement('script');
    ga.async = true;
    ga.src = 'https://www.googletagmanager.com/gtag/js?id=G-SXWZ5613QV';
    document.head.appendChild(ga);
    ga.onload = () => {
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-SXWZ5613QV');
    };

    const cl = document.createElement('script');
    cl.defer = true;
    cl.innerHTML = '(function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);})(window, document, "clarity", "script", "xnay3et4bz");';
    document.head.appendChild(cl);
  }
  const start = () => { loadAnalytics(); remove(); };
  function remove(){
    ['scroll','mousedown','touchstart','keydown'].forEach(ev => window.removeEventListener(ev, start, { passive: true }));
  }
  ['scroll','mousedown','touchstart','keydown'].forEach(ev => window.addEventListener(ev, start, { passive: true }));
  (window.requestIdleCallback || function(f){ setTimeout(f,1500); })(loadAnalytics);
})();
</script>
